<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock • Dark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7), inset 0 0 0 1px #333;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }
        .time {
            font-family: 'Courier New', monospace;
            font-size: 4.5rem;
            font-weight: 700;
            color: #00ff99;
            text-shadow: 0 0 8px #00ff9966;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        .date {
            font-size: 1.5rem;
            color: #ccc;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Digital Clock</h2>
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">Mon, Jan 01, 2024</div>
    </div>

    <script>
        (function() {
            const timeEl = document.getElementById('time');
            const dateEl = document.getElementById('date');

            function update() {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2,'0');
                const minutes = now.getMinutes().toString().padStart(2,'0');
                const seconds = now.getSeconds().toString().padStart(2,'0');
                timeEl.textContent = `${hours}:${minutes}:${seconds}`;

                const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const dayName = days[now.getDay()];
                const monthName = months[now.getMonth()];
                const day = now.getDate().toString().padStart(2,'0');
                const year = now.getFullYear();
                dateEl.textContent = `${dayName}, ${monthName} ${day}, ${year}`;
            }

            update();
            setInterval(update, 1000);
        })();
    </script>
</body>
</html>
